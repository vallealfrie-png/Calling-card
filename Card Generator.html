<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Identity Studio | Calling Card Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&family=JetBrains+Mono&display=swap');

        :root {
            --primary: #ff8a8a;
            --secondary: #fbc4ab;
            --text-dark: #4a3f3f;
            --card-bg: #ffffff;
            --font-main: 'Inter', sans-serif;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* --- Sidebar UI --- */
        .sidebar {
            width: 380px;
            background: #ffffff;
            padding: 25px;
            box-shadow: 5px 0 20px rgba(0,0,0,0.05);
            z-index: 100;
            overflow-y: auto;
        }

        h2 { color: #333; margin-top: 0; font-size: 1.2rem; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: #666; margin-bottom: 4px; text-transform: uppercase; }
        input {
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; box-sizing: border-box;
        }

        /* Style Toggles */
        .style-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 20px 0; }
        .style-btn {
            padding: 10px; border: 2px solid #eee; border-radius: 8px; background: white; cursor: pointer;
            font-size: 0.8rem; font-weight: 600; transition: all 0.2s;
        }
        .style-btn:hover { border-color: #ddd; }
        .style-btn.active { border-color: var(--primary); background: #fffafa; color: var(--primary); }

        .print-btn {
            width: 100%; padding: 15px; background: #333; color: white; border: none; border-radius: 8px;
            font-weight: 700; cursor: pointer; margin-top: 15px; font-size: 1rem;
        }

        /* --- Preview Area --- */
        .preview-area { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; }
        
        /* Business Card Base (3.5in x 2in) */
        #card-container {
            width: 3.5in; height: 2in; background: var(--card-bg); border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); position: relative; overflow: hidden;
            display: flex; transition: all 0.3s ease; border: 1px solid #eee;
        }

        /* --- STYLE THEMES --- */

        /* 1. Rose Gold (Girlish) */
        .theme-rose { --primary: #ff8a8a; --secondary: #fbc4ab; --text-dark: #4a3f3f; }
        .theme-rose .accent { position: absolute; right: 0; top: 0; width: 35%; height: 100%; background: linear-gradient(135deg, var(--primary), var(--secondary)); clip-path: polygon(25% 0%, 100% 0%, 100% 100%, 0% 100%); }

        /* 2. Midnight Executive (Professional Male) */
        .theme-midnight { --primary: #1a1a1a; --secondary: #333; --text-dark: #ffffff; --card-bg: #111; }
        .theme-midnight .accent { position: absolute; left: 0; bottom: 0; width: 100%; height: 8px; background: #c5a059; } /* Gold bar */
        .theme-midnight #card-name { color: #c5a059; font-family: 'Playfair Display', serif; }

        /* 3. Corporate Blue (Neutral/Modern) */
        .theme-corporate { --primary: #004e92; --secondary: #000428; --text-dark: #1e2a38; }
        .theme-corporate .accent { position: absolute; left: 0; top: 0; width: 10px; height: 100%; background: var(--primary); }

        /* 4. Minimalist White (Clean) */
        .theme-minimal { --primary: #555; --secondary: #999; --text-dark: #222; }
        .theme-minimal #card-container { border: 1px solid #ddd; }
        .theme-minimal .qr-container { filter: grayscale(1); border: 1px solid #eee; }

        /* 5. Vibe Coding (Tech/Creative) */
        .theme-vibe { --primary: #00f2fe; --secondary: #4facfe; --text-dark: #000; --font-main: 'JetBrains Mono', monospace; }
        .theme-vibe .accent { position: absolute; right: -50px; top: -50px; width: 150px; height: 150px; background: var(--primary); filter: blur(40px); opacity: 0.5; border-radius: 50%; }

        /* --- Card Content Interior --- */
        .card-body { z-index: 5; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; width: 100%; height: 100%; box-sizing: border-box; position: relative; }
        
        .logo-box img { height: 35px; width: auto; margin-bottom: 10px; }
        
        #card-name { font-size: 1.1rem; font-weight: 700; color: var(--text-dark); margin: 0; letter-spacing: 0.5px; font-family: var(--font-main); }
        #card-pos { font-size: 0.65rem; color: var(--primary); font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 2px; }

        .contact-info { font-size: 0.55rem; color: #777; line-height: 1.4; margin-top: auto; }
        .theme-midnight .contact-info { color: #bbb; }

        .qr-wrapper { position: absolute; right: 20px; bottom: 20px; background: white; padding: 4px; border-radius: 4px; }

        /* --- PRINT --- */
        @media print {
            body { background: white; }
            .sidebar { display: none; }
            .preview-area { padding: 0; }
            #card-container { box-shadow: none; border: 0.5px solid #eee; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Card Identity Studio</h2>
        
        <div class="input-group">
            <label>Name</label>
            <input type="text" id="inName" value="Alfrie S. Valle" oninput="sync()">
        </div>
        <div class="input-group">
            <label>Title</label>
            <input type="text" id="inPos" value="Full Stack Web Developer" oninput="sync()">
        </div>
        <div class="input-group">
            <label>Email</label>
            <input type="text" id="inEmail" value="alfrie.valle@example.com" oninput="sync()">
        </div>
        <div class="input-group">
            <label>Phone</label>
            <input type="text" id="inPhone" value="+63 977 834 1105" oninput="sync()">
        </div>
        <div class="input-group">
            <label>QR Link (FB/Web)</label>
            <input type="text" id="inQR" value="https://facebook.com/analiza.mopera" oninput="updateQR()">
        </div>

        <label style="margin-top:20px;">Choose Design Style</label>
        <div class="style-grid">
            <button class="style-btn theme-rose active" onclick="setTheme('theme-rose', this)">Rose Gold (G)</button>
            <button class="style-btn theme-midnight" onclick="setTheme('theme-midnight', this)">Midnight (M)</button>
            <button class="style-btn theme-corporate" onclick="setTheme('theme-corporate', this)">Corporate Blue</button>
            <button class="style-btn theme-minimal" onclick="setTheme('theme-minimal', this)">Minimalist</button>
            <button class="style-btn theme-vibe" onclick="setTheme('theme-vibe', this)">Vibe Coding</button>
        </div>

        <button class="print-btn" onclick="window.print()">Download / Print PDF</button>
        <p style="font-size: 0.6rem; color: #999; text-align: center; margin-top: 10px;">Set paper size to A4 and enable "Background Graphics" in print settings.</p>
    </div>

    <div class="preview-area">
        <div id="card-container" class="theme-rose">
            <div class="accent"></div>
            
            <div class="card-body">
                <div class="logo-box">
                    <img src="https://i.imgur.com/VbZKWAf.png" alt="Logo">
                </div>

                <div class="main-info">
                    <h1 id="card-name">Alfrie S. Valle</h1>
                    <div id="card-pos">Full Stack Web Developer</div>
                </div>

                <div class="contact-info">
                    <div id="card-email">alfrie.valle@example.com</div>
                    <div id="card-phone">+63 977 834 1105</div>
                </div>

                <div class="qr-wrapper">
                    <div id="qrcode"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const qrcode = new QRCode(document.getElementById("qrcode"), {
            text: "https://facebook.com/analiza.mopera",
            width: 55, height: 55,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        function sync() {
            document.getElementById('card-name').innerText = document.getElementById('inName').value;
            document.getElementById('card-pos').innerText = document.getElementById('inPos').value;
            document.getElementById('card-email').innerText = document.getElementById('inEmail').value;
            document.getElementById('card-phone').innerText = document.getElementById('inPhone').value;
        }

        function updateQR() {
            qrcode.clear();
            qrcode.makeCode(document.getElementById('inQR').value);
        }

        function setTheme(themeName, btn) {
            // Remove active classes
            document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // Apply theme to card
            const container = document.getElementById('card-container');
            container.className = ''; // clear
            container.classList.add(themeName);

            // Special logic for QR color in midnight theme
            if(themeName === 'theme-midnight') {
                // Keep QR readable on white background
            }
        }
    </script>
</body>
</html>
