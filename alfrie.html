<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfrie S. Valle | Portfolio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

        body {
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
            font-family: 'Inter', sans-serif;
        }

        /* --- Logo Styles (Outside Card) --- */
        .company-logo-container {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .company-logo-container img {
            width: 120px;
            height: auto;
        }

        /* --- Profile Card Styles --- */
        .card {
            width: 280px;
            height: 280px;
            background: white;
            border-radius: 32px;
            padding: 3px;
            position: relative;
            box-shadow: #604b4a30 0px 70px 30px -50px;
            transition: all 0.5s ease-in-out;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .card .mail {
            position: absolute;
            right: 1.5rem;
            top: 1.4rem;
            z-index: 10;
            text-decoration: none;
        }

        .card .mail svg {
            stroke: #00ced1; 
            stroke-width: 3px;
            width: 24px;
            height: 24px;
        }

        .card .profile-pic {
            position: absolute;
            width: calc(100% - 6px);
            height: calc(100% - 6px);
            top: 3px;
            left: 3px;
            border-radius: 29px;
            z-index: 1;
            overflow: hidden;
            transition: all 0.5s ease-in-out 0.2s;
        }

        .card .profile-pic img {
            object-fit: cover;
            width: 100%;
            height: 100%;
            object-position: center 10%; 
            transition: all 0.5s ease-in-out 0s;
        }

        .card .bottom {
            position: absolute;
            bottom: 3px;
            left: 3px;
            right: 3px;
            background: #00ced1; 
            top: 80%; 
            border-radius: 29px;
            z-index: 2;
            box-shadow: rgba(0, 100, 100, 0.2) 0px 5px 5px 0px inset;
            transition: all 0.5s cubic-bezier(0.645, 0.045, 0.355, 1) 0s;
            display: flex;
            flex-direction: column;
        }

        .card .bottom .content {
            padding: 1rem 1.2rem;
            opacity: 0;
            transition: opacity 0.3s ease-in-out, transform 0.5s ease-in-out;
            pointer-events: none;
        }

        .card .bottom .content .name {
            display: block;
            font-size: 1.1rem;
            color: white;
            font-weight: bold;
        }

        .card .bottom .content .position-label {
            display: block;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            margin-bottom: 6px;
        }

        .card .bottom .content .about-me {
            display: block;
            font-size: 0.7rem;
            color: white;
            line-height: 1.4;
        }

        .card .bottom .bottom-bottom {
            position: absolute;
            bottom: 12px;
            left: 1.2rem;
            right: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 5;
        }

        /* --- Social Links --- */
        .social-links-container {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .card .bottom .bottom-bottom svg { 
            height: 20px; 
            width: 20px; 
            fill: white; 
            transition: fill 0.3s ease;
        }

        .social-links-container a:hover .viber-icon {
            fill: #7360f2; /* Viber Brand Color */
        }

        .card .bottom .bottom-bottom .button {
            background: white;
            color: #00ced1; 
            text-decoration: none;
            border-radius: 20px;
            font-size: 0.7rem;
            padding: 0.5rem 1rem;
            font-weight: bold;
        }

        /* --- Hover States --- */
        .card:hover .bottom {
            top: 20%;
            border-radius: 60px 29px 29px 29px;
        }

        .card:hover .bottom .content {
            opacity: 1;
            transform: translateY(60px); 
            pointer-events: auto;
        }

        .card:hover .profile-pic {
            width: 100px;
            height: 100px;
            top: 12px;
            left: 12px;
            border-radius: 50%;
            z-index: 3;
            border: 6px solid #00ced1; 
        }

        .card:hover .profile-pic img {
            transform: scale(1.1); 
        }

        /* --- Typing Animation Section --- */
        .wrapper { text-align: center; }
        .title { font-size: 1.5rem; font-weight: 700; color: #333; }
        .title span:after {
            content: 'Data Analyst';
            animation: words 9s infinite;
        }

        @keyframes words {
            0%, 33% { content: 'Data Analyst'; color: #00ced1; }
            34%, 66% { content: 'Full Stack Developer'; color: #20b2aa; }
            67%, 100% { content: 'Cost Accountant'; color: #48d1cc; }
        }
    </style>
</head>
