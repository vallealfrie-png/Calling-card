<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Identity Studio | V4.0 Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500;800&display=swap');

        :root {
            --primary: #c5a059;
            --secondary: #1a3820;
            --text-dark: #4a3f3f;
            --card-bg: #ffffff;
        }

        * {
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 320px;
            background: #ffffff;
            padding: 20px;
            box-shadow: 5px 0 20px rgba(0,0,0,0.05);
            z-index: 100;
            overflow-y: auto;
            flex-shrink: 0;
        }

        h2 { color: #333; font-size: 1.1rem; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .input-group { margin-bottom: 10px; }
        label { display: block; font-size: 0.7rem; font-weight: 700; color: #666; margin-bottom: 3px; text-transform: uppercase; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }

        /* Pro Toggle Style */
        .toggle-group {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            margin: 15px 0;
            border: 1px solid #e9ecef;
        }
        .toggle-group label { color: #1a3820; margin-bottom: 5px; }

        .style-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 15px 0; }
        .style-btn {
            padding: 8px; border: 1px solid #eee; border-radius: 6px; background: white; cursor: pointer;
            font-size: 0.75rem; font-weight: 600;
        }
        .style-btn.active { border-color: var(--primary); background: #fffafa; color: var(--primary); }

        .print-btn {
            width: 100%; padding: 12px; background: #1a3820; color: white; border: none; border-radius: 6px;
            font-weight: 700; cursor: pointer; margin-top: 10px;
        }

        .preview-area {
            flex-grow: 1;
            padding: 20px;
            display: flex;
            justify-content: center;
            overflow-y: auto;
        }

        .print-grid {
            display: grid;
            grid-template-columns: repeat(2, 3.5in);
            grid-template-rows: repeat(5, 2in);
            gap: 0; 
            padding: 10mm;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            width: max-content;
        }

        .card-wrapper {
            width: 3.5in;
            height: 2in;
            position: relative;
            outline: 0.5pt dashed #ddd; 
        }

        .card-inner {
            width: 100%;
            height: 100%;
            background: #ffffff;
            position: relative;
            overflow: hidden;
            display: flex;
        }

        /* Themes */
        .theme-royal { --primary: #c5a059; --secondary: #1a3820; --text-dark: #ffffff; }
        .theme-royal .card-inner { background: #1a3820 !important; }
        .theme-royal .accent { 
            position: absolute; right: 20%; top: -20%; width: 80%; height: 140%; 
            border-right: 18px solid var(--primary); 
            border-radius: 45% 55% 50% 50% / 40% 40% 60% 60%;
            transform: rotate(-5deg); opacity: 0.9; pointer-events: none;
        }
        .theme-royal .card-name { color: white; text-transform: uppercase; letter-spacing: 1px; }
        .theme-royal .card-pos { color: #c5a059; }
        .theme-royal .contact-info { color: #f0f0f0; }

        .theme-vibe { --primary: #00f2fe; --secondary: #4facfe; --text-dark: #000; --font-main: 'JetBrains Mono', monospace; }
        .theme-vibe .accent { position: absolute; right: -50px; top: -50px; width: 150px; height: 150px; background: #00f2fe !important; filter: blur(40px); opacity: 0.5; border-radius: 50%; }

        .card-body { z-index: 5; padding: 18px 22px; display: flex; flex-direction: column; justify-content: space-between; width: 100%; height: 100%; box-sizing: border-box; position: relative; }
        .logo-box img { height: 32px; width: auto; }
        .card-name { font-size: 1.1rem; font-weight: 700; color: var(--text-dark); margin: 0; }
        .card-pos { font-size: 0.6rem; color: var(--primary); font-weight: 600; text-transform: uppercase; margin-top: 2px; }
        .contact-info { font-size: 0.5rem; line-height: 1.4; font-weight: 500; }
        .qr-wrapper { position: absolute; right: 20px; bottom: 18px; background: white; padding: 3px; border-radius: 2px; }

        @media print {
            @page { size: A4; margin: 0; }
            .sidebar { display: none; }
            .print-grid { box-shadow: none; padding: 10mm 5mm; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Identity Studio V4</h2>
        <div class="input-group"><label>Full Name</label><input type="text" id="inName" value="Maricel A. Ang" oninput="sync()"></div>
        <div class="input-group"><label>Title</label><input type="text" id="inPos" value="Marketing Events Activation Specialist" oninput="sync()"></div>
        <div class="input-group"><label>Email</label><input type="text" id="inEmail" value="angmcel.phmclp@gmail.com" oninput="sync()"></div>
        <div class="input-group"><label>Phone</label><input type="text" id="inPhone" value="+639277898188" oninput="sync()"></div>
        
        <div class="toggle-group">
            <label>QR Mode</label>
            <select id="qrMode" onchange="updateQR()" style="width:100%; padding:5px;">
                <option value="link">Website Link</option>
                <option value="contact" selected>Smart Contact (Auto-Save)</option>
            </select>
            <div id="linkInput" style="display:none; margin-top:10px;">
                <label>URL</label>
                <input type="text" id="inQR" value="https://facebook.com/profile" oninput="updateQR()">
            </div>
        </div>

        <div class="style-grid">
            <button class="style-btn active" onclick="setTheme('theme-royal', this)">Royal S-Curve</button>
            <button class="style-btn" onclick="setTheme('theme-vibe', this)">Vibe Coding</button>
        </div>

        <button class="print-btn" onclick="window.print()">Print A4 (10 Cards)</button>
    </div>

    <div class="preview-area">
        <div class="print-grid" id="print-grid"></div>
    </div>

    <script>
        const grid = document.getElementById('print-grid');
        
        function initGrid() {
            grid.innerHTML = "";
            for (let i = 0; i < 10; i++) {
                grid.innerHTML += `
                    <div class="card-wrapper">
                        <div class="card-inner theme-royal">
                            <div class="accent"></div>
                            <div class="card-body">
                                <div class="logo-box"><img src="https://i.imgur.com/VbZKWAf.png" alt="Logo"></div>
                                <div class="main-info">
                                    <h1 class="card-name">Maricel A. Ang</h1>
                                    <div class="card-pos">Marketing Events Activation Specialist</div>
                                </div>
                                <div class="contact-info">
                                    <div class="card-email">angmcel.phmclp@gmail.com</div>
                                    <div class="card-phone">+63 927 789 8188</div>
                                </div>
                                <div class="qr-wrapper"><div id="qrcode-${i}"></div></div>
                            </div>
                        </div>
                    </div>`;
            }
            updateQR();
        }

        window.onload = initGrid;

        function sync() {
            document.querySelectorAll('.card-name').forEach(el => el.innerText = document.getElementById('inName').value);
            document.querySelectorAll('.card-pos').forEach(el => el.innerText = document.getElementById('inPos').value);
            document.querySelectorAll('.card-email').forEach(el => el.innerText = document.getElementById('inEmail').value);
            document.querySelectorAll('.card-phone').forEach(el => el.innerText = document.getElementById('inPhone').value);
            updateQR(); // Re-sync QR if text changes
        }

        function updateQR() {
            const mode = document.getElementById('qrMode').value;
            const linkDiv = document.getElementById('linkInput');
            linkDiv.style.display = (mode === 'link') ? 'block' : 'none';

            let qrContent = "";

            if (mode === 'contact') {
                const name = document.getElementById('inName').value;
                const phone = document.getElementById('inPhone').value;
                const email = document.getElementById('inEmail').value;
                const title = document.getElementById('inPos').value;
                // MECARD Format for instant contact saving
                qrContent = `MECARD:N:${name};TEL:${phone};EMAIL:${email};NOTE:${title};;`;
            } else {
                qrContent = document.getElementById('inQR').value;
            }

            const activeBtn = document.querySelector('.style-btn.active');
            const activeTheme = activeBtn ? activeBtn.getAttribute('onclick').match(/'([^']+)'/)[1] : 'theme-royal';
            
            for (let i = 0; i < 10; i++) {
                const qrContainer = document.getElementById(`qrcode-${i}`);
                if (!qrContainer) continue;
                qrContainer.innerHTML = "";
                
                const isRoyal = activeTheme === 'theme-royal';
                new QRCode(qrContainer, {
                    text: qrContent,
                    width: 45, height: 45,
                    colorDark : isRoyal ? "#c5a059" : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.M
                });
            }
        }

        function setTheme(themeName, btn) {
            document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.card-inner').forEach(card => {
                card.className = 'card-inner ' + themeName;
            });
            updateQR();
        }
    </script>
</body>
</html>
