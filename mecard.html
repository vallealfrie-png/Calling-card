<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Identity Studio | V4.6 Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500;800&display=swap');

        :root {
            --primary: #c5a059;
            --secondary: #1a3820;
            --text-dark: #4a3f3f;
            --font-main: 'Inter', sans-serif;
        }

        * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 320px;
            background: #ffffff;
            padding: 20px;
            box-shadow: 5px 0 20px rgba(0,0,0,0.05);
            z-index: 100;
            overflow-y: auto;
            flex-shrink: 0;
        }

        h2 { color: #333; font-size: 1.1rem; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0; }
        .input-group { margin-bottom: 10px; }
        label { display: block; font-size: 0.7rem; font-weight: 700; color: #666; margin-bottom: 3px; text-transform: uppercase; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; }

        .style-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 15px 0; }
        .style-btn {
            padding: 8px; border: 1px solid #eee; border-radius: 6px; background: white; cursor: pointer;
            font-size: 0.7rem; font-weight: 600; transition: 0.2s;
        }
        .style-btn.active { border-color: var(--primary); background: #fffafa; color: var(--primary); }

        .btn-main {
            width: 100%; padding: 12px; border: none; border-radius: 6px;
            font-weight: 700; cursor: pointer; margin-top: 10px;
        }
        .print-btn { background: #1a3820; color: white; }
        .mode-btn { background: #2c3e50; color: white; }

        /* --- Preview Area --- */
        .preview-area {
            flex-grow: 1;
            padding: 20px;
            display: flex;
            justify-content: center;
            overflow-y: auto;
        }

        /* Grid Layout */
        .print-grid {
            display: grid;
            grid-template-columns: repeat(2, 3.5in);
            grid-template-rows: repeat(5, 2in);
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            width: max-content;
        }

        /* Cutting Guide Wrapper */
        .card-wrapper {
            width: 3.5in;
            height: 2in;
            position: relative;
            border: 0.1pt dashed #ccc; /* The Cutting Guide */
            overflow: hidden;
        }

        /* Single Preview Mode Logic */
        .single-mode .card-wrapper:not(:first-child) { display: none; }
        .single-mode .print-grid { 
            grid-template-columns: 3.5in; 
            grid-template-rows: 2in;
            transform: scale(1.8);
            transform-origin: top center;
            margin-top: 50px;
        }

        /* --- Card Content --- */
        .card-inner { width: 100%; height: 100%; position: relative; display: flex; }
        .card-body { z-index: 5; padding: 18px 22px; display: flex; flex-direction: column; justify-content: space-between; width: 100%; height: 100%; position: relative; }
        .logo-box img { height: 32px; width: auto; }
        .card-name { font-size: 1.1rem; font-weight: 700; margin: 0; }
        .card-pos { font-size: 0.6rem; font-weight: 600; text-transform: uppercase; margin-top: 2px; }
        .contact-info { font-size: 0.5rem; line-height: 1.4; font-weight: 500; }
        .qr-wrapper { position: absolute; right: 20px; bottom: 18px; background: white; padding: 3px; border-radius: 2px; }

        /* --- THEMES --- */
        .theme-royal { --primary: #c5a059; --text-dark: #ffffff; background: #1a3820 !important; }
        .theme-royal .accent { position: absolute; right: 20%; top: -20%; width: 80%; height: 140%; border-right: 18px solid var(--primary); border-radius: 45% 55% 50% 50% / 40% 40% 60% 60%; transform: rotate(-5deg); opacity: 0.9; }
        .theme-royal .card-name { color: white; }
        
        .theme-prime { --primary: #1a3820; --text-dark: #333; }
        .theme-prime .accent { position: absolute; left: 0; top: 0; width: 15px; height: 100%; background: #1a3820 !important; }

        .theme-rose { --primary: #ff8a8a; --text-dark: #4a3f3f; }
        .theme-rose .accent { position: absolute; right: 0; top: 0; width: 35%; height: 100%; background: linear-gradient(135deg, #ff8a8a, #fbc4ab) !important; clip-path: polygon(25% 0%, 100% 0%, 100% 100%, 0% 100%); }

        .theme-forest { --primary: #1a3820; --text-dark: #1a3820; }
        .theme-forest .accent { position: absolute; right: 0; top: 0; width: 30%; height: 100%; background: #1a3820 !important; clip-path: polygon(30% 0%, 100% 0%, 100% 100%, 0% 100%); }

        .theme-vibe { --primary: #00f2fe; --text-dark: #000; --font-main: 'JetBrains Mono', monospace; }
        .theme-vibe .accent { position: absolute; right: -50px; top: -50px; width: 150px; height: 150px; background: #00f2fe !important; filter: blur(40px); opacity: 0.5; border-radius: 50%; }

        .theme-midnight { --primary: #c5a059; background: #111 !important; }
        .theme-midnight .accent { position: absolute; left: 0; bottom: 0; width: 100%; height: 8px; background: #c5a059 !important; }
        .theme-midnight .card-name { color: #c5a059; }

        /* --- PRINT ENGINE --- */
        @media print {
            @page { size: A4 portrait; margin: 0; }
            body { background: white; display: block; }
            .sidebar { display: none; }
            .preview-area { padding: 0; margin: 0; display: block; }
            .print-grid { 
                display: grid !important; 
                grid-template-columns: repeat(2, 3.5in) !important; 
                grid-template-rows: repeat(5, 2in) !important; 
                padding: 10mm 5mm !important; 
                box-shadow: none !important;
                transform: none !important;
                margin: 0 auto !important;
            }
            .card-wrapper { display: block !important; border: 0.1pt dashed #ccc !important; }
        }
    </style>
</head>
<body class="grid-mode">

    <div class="sidebar">
        <h2>Identity Studio V4.6</h2>
        <div class="input-group"><label>Name</label><input type="text" id="inName" value="Maricel A. Ang" oninput="sync()"></div>
        <div class="input-group"><label>Title</label><input type="text" id="inPos" value="Marketing Events Activation Specialist" oninput="sync()"></div>
        <div class="input-group"><label>Email</label><input type="text" id="inEmail" value="angmcel.phmclp@gmail.com" oninput="sync()"></div>
        <div class="input-group"><label>Phone</label><input type="text" id="inPhone" value="+639277898188" oninput="sync()"></div>

        <div style="margin: 15px 0;">
            <label>QR Mode</label>
            <select id="qrMode" onchange="updateQR()">
                <option value="contact" selected>Smart Contact</option>
                <option value="link">Website Link</option>
            </select>
            <input type="text" id="inQR" value="https://facebook.com" oninput="updateQR()" style="display:none; margin-top:5px;">
        </div>

        <label>Themes</label>
        <div class="style-grid">
            <button class="style-btn active" onclick="setTheme('theme-royal', this)">Royal</button>
            <button class="style-btn" onclick="setTheme('theme-prime', this)">Prime</button>
            <button class="style-btn" onclick="setTheme('theme-rose', this)">Rose</button>
            <button class="style-btn" onclick="setTheme('theme-forest', this)">Forest</button>
            <button class="style-btn" onclick="setTheme('theme-vibe', this)">Vibe</button>
            <button class="style-btn" onclick="setTheme('theme-midnight', this)">Midnight</button>
        </div>

        <button class="btn-main mode-btn" onclick="toggleView()">Switch View (Single/Grid)</button>
        <button class="btn-main print-btn" onclick="window.print()">Print A4 (10 Cards)</button>
    </div>

    <div class="preview-area">
        <div class="print-grid" id="print-grid"></div>
    </div>

    <script>
        const grid = document.getElementById('print-grid');
        let currentTheme = 'theme-royal';
        
        function initGrid() {
            grid.innerHTML = "";
            for (let i = 0; i < 10; i++) {
                grid.innerHTML += `
                    <div class="card-wrapper">
                        <div class="card-inner ${currentTheme}">
                            <div class="accent"></div>
                            <div class="card-body">
                                <div class="logo-box"><img src="https://i.imgur.com/VbZKWAf.png" alt="Logo"></div>
                                <div>
                                    <h1 class="card-name">Maricel A. Ang</h1>
                                    <div class="card-pos">Marketing Events Activation Specialist</div>
                                </div>
                                <div class="contact-info">
                                    <div class="card-email">angmcel.phmclp@gmail.com</div>
                                    <div class="card-phone">+63 927 789 8188</div>
                                </div>
                                <div class="qr-wrapper"><div id="qrcode-${i}"></div></div>
                            </div>
                        </div>
                    </div>`;
            }
            updateQR();
        }

        window.onload = initGrid;

        function toggleView() {
            document.body.classList.toggle('grid-mode');
            document.body.classList.toggle('single-mode');
        }

        function sync() {
            document.querySelectorAll('.card-name').forEach(el => el.innerText = document.getElementById('inName').value);
            document.querySelectorAll('.card-pos').forEach(el => el.innerText = document.getElementById('inPos').value);
            document.querySelectorAll('.card-email').forEach(el => el.innerText = document.getElementById('inEmail').value);
            document.querySelectorAll('.card-phone').forEach(el => el.innerText = document.getElementById('inPhone').value);
            updateQR();
        }

        function updateQR() {
            const mode = document.getElementById('qrMode').value;
            document.getElementById('inQR').style.display = (mode === 'link') ? 'block' : 'none';

            let qrText = (mode === 'contact') 
                ? `MECARD:N:${document.getElementById('inName').value};TEL:${document.getElementById('inPhone').value};EMAIL:${document.getElementById('inEmail').value};;`
                : document.getElementById('inQR').value;

            for (let i = 0; i < 10; i++) {
                const container = document.getElementById(`qrcode-${i}`);
                if (!container) continue;
                container.innerHTML = "";
                new QRCode(container, {
                    text: qrText,
                    width: 45, height: 45,
                    colorDark : (currentTheme === 'theme-royal' || currentTheme === 'theme-midnight') ? "#c5a059" : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.M
                });
            }
        }

        function setTheme(theme, btn) {
            currentTheme = theme;
            document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.card-inner').forEach(card => card.className = 'card-inner ' + theme);
            updateQR();
        }
    </script>
</body>
</html>
