<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anna Mopera | Portfolio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

        body {
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column; /* Stack card and text vertically */
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        /* --- Profile Card Styles --- */
        .card {
            width: 280px;
            height: 280px;
            background: white;
            border-radius: 32px;
            padding: 3px;
            position: relative;
            box-shadow: #604b4a30 0px 70px 30px -50px;
            transition: all 0.5s ease-in-out;
            overflow: hidden;
            margin-bottom: 30px; /* Space between card and typing text */
        }

        .card .mail {
            position: absolute;
            right: 1.5rem;
            top: 1.4rem;
            z-index: 10;
            text-decoration: none;
        }

        .card .mail svg {
            stroke: #fbb9b6;
            stroke-width: 3px;
            width: 24px;
            height: 24px;
        }

        .card .profile-pic {
            position: absolute;
            width: calc(100% - 6px);
            height: calc(100% - 6px);
            top: 3px;
            left: 3px;
            border-radius: 29px;
            z-index: 1;
            overflow: hidden;
            transition: all 0.5s ease-in-out 0.2s;
        }

        .card .profile-pic img {
            object-fit: cover;
            width: 100%;
            height: 100%;
            object-position: center 5%; 
            transition: all 0.5s ease-in-out 0s;
        }

        .card .bottom {
            position: absolute;
            bottom: 3px;
            left: 3px;
            right: 3px;
            background: #fbb9b6;
            top: 80%; 
            border-radius: 29px;
            z-index: 2;
            box-shadow: rgba(96, 75, 74, 0.1882352941) 0px 5px 5px 0px inset;
            transition: all 0.5s cubic-bezier(0.645, 0.045, 0.355, 1) 0s;
            display: flex;
            flex-direction: column;
        }

        .card .bottom .content {
            padding: 1rem 1.2rem;
            opacity: 0;
            transition: opacity 0.3s ease-in-out, transform 0.5s ease-in-out;
            pointer-events: none;
        }

        .card .bottom .content .name {
            display: block;
            font-size: 1.1rem;
            color: white;
            font-weight: bold;
        }

        .card .bottom .content .position-label {
            display: block;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            margin-bottom: 6px;
        }

        .card .bottom .content .about-me {
            display: block;
            font-size: 0.72rem;
            color: white;
            line-height: 1.4;
        }

        .card .bottom .bottom-bottom {
            position: absolute;
            bottom: 12px;
            left: 1.2rem;
            right: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 5;
        }

        .card .bottom .bottom-bottom svg { height: 22px; width: 22px; fill: white; }

        .card .bottom .bottom-bottom .button {
            background: white;
            color: #fbb9b6;
            text-decoration: none;
            border-radius: 20px;
            font-size: 0.7rem;
            padding: 0.5rem 1rem;
            font-weight: bold;
        }

        /* --- Typing Animation Styles --- */
        .wrapper {
            text-align: center;
        }

        .title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #333; /* Darker color for readability on light background */
        }

        .title span:after {
            content: 'Brand Specialist';
            animation: words 9s infinite;
        }

        @keyframes words {
            0%, 33% {
                content: 'Brand Specialist';
                color: #f55d56;
            }
            34%, 66% {
                content: 'Creative Designer';
                color: #fbb9b6;
            }
            67%, 100% {
                content: 'Marketing Strategist';
                color: #ff9a9e;
            }
        }

        /* --- Hover States --- */
        .card:hover .bottom {
            top: 20%;
            border-radius: 60px 29px 29px 29px;
        }

        .card:hover .bottom .content {
            opacity: 1;
            transform: translateY(60px);
            pointer-events: auto;
        }

        .card:hover .profile-pic {
            width: 100px;
            height: 100px;
            top: 12px;
            left: 12px;
            border-radius: 50%;
            z-index: 3;
            border: 6px solid #fbb9b6;
        }
    </style>
</head>
<body>

    <div class="card">
        <a href="mailto:annamopera1105@gmail.com" class="mail">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
            </svg>
        </a>

        <div class="profile-pic">
            <img src="https://i.imgur.com/UdP7XbX.png" alt="Anna Mopera">
        </div>

        <div class="bottom">
            <div class="content">
                <span class="name">Anna Mopera</span>
                <span class="position-label">Brand Specialist</span>
                <span class="about-me">
                    Elevating brands through strategic storytelling and visual identity. I bridge the gap between market positioning and authentic connection.
                </span>
            </div>

            <div class="bottom-bottom">
                <div class="social-links-container">
                    <a href="https://www.facebook.com/analiza.mopera" target="_blank">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                        </svg>
                    </a>
                </div>
                <a href="tel:+639778341105" class="button">Contact Me</a>
            </div>
        </div>
    </div>

    <div class="wrapper">
        <h1 class="title">
            I am a
            <span></span>
        </h1>
    </div>

</body>
</html>
