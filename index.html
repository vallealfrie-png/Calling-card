<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anna Mopera | Brand Specialist</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        .card {
            width: 280px;
            height: 280px;
            background: white;
            border-radius: 32px;
            padding: 3px;
            position: relative;
            box-shadow: #604b4a30 0px 70px 30px -50px;
            transition: all 0.5s ease-in-out;
            cursor: pointer;
        }

        .card .mail {
            position: absolute;
            right: 2rem;
            top: 1.4rem;
            background: transparent;
            border: none;
            z-index: 10;
            text-decoration: none;
        }

        .card .mail svg {
            stroke: #fbb9b6;
            stroke-width: 3px;
            width: 24px;
            height: 24px;
        }

        .card .profile-pic {
            position: absolute;
            width: calc(100% - 6px);
            height: calc(100% - 6px);
            top: 3px;
            left: 3px;
            border-radius: 29px;
            z-index: 1;
            overflow: hidden;
            transition: all 0.5s ease-in-out 0.2s, z-index 0.5s ease-in-out 0.2s;
        }

        .card .profile-pic img {
            object-fit: cover;
            width: 100%;
            height: 100%;
            /* ADJUSTED: High percentage pushes the image DOWN */
            object-position: center 65%; 
            transition: all 0.5s ease-in-out 0s;
        }

        .card .bottom {
            position: absolute;
            bottom: 3px;
            left: 3px;
            right: 3px;
            background: #fbb9b6;
            top: 80%;
            border-radius: 29px;
            z-index: 2;
            box-shadow: rgba(96, 75, 74, 0.1882352941) 0px 5px 5px 0px inset;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.645, 0.045, 0.355, 1) 0s;
        }

        .card .bottom .content {
            position: absolute;
            top: 20px; /* Reference point from top of the pink area */
            left: 1.5rem;
            right: 1.5rem;
            transition: transform 0.5s ease-in-out 0.2s;
        }

        .card .bottom .content .name {
            display: block;
            font-size: 1.2rem;
            color: white;
            font-weight: bold;
        }

        .card .bottom .content .about-me {
            display: block;
            font-size: 0.8rem;
            color: white;
            margin-top: 0.6rem;
            line-height: 1.3;
        }

        .card .bottom .bottom-bottom {
            position: absolute;
            bottom: 0.8rem;
            left: 1.2rem;
            right: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card .bottom .bottom-bottom .social-links-container svg {
            height: 22px;
            width: 22px;
            fill: white;
            transition: all 0.3s;
        }

        .card .bottom .bottom-bottom .button {
            background: white;
            color: #fbb9b6;
            text-decoration: none;
            border-radius: 20px;
            font-size: 0.65rem;
            padding: 0.5rem 0.8rem;
            font-weight: bold;
            white-space: nowrap;
        }

        /* --- Hover States --- */

        .card:hover {
            border-top-left-radius: 55px;
        }

        .card:hover .bottom {
            top: 20%;
            border-radius: 80px 29px 29px 29px;
            transition: all 0.5s cubic-bezier(0.645, 0.045, 0.355, 1) 0.2s;
        }

        /* FIX: Pushes the text container down by 90px so it sits below the circle */
        .card:hover .bottom .content {
            transform: translateY(90px);
        }

        .card:hover .profile-pic {
            width: 100px;
            height: 100px;
            top: 10px;
            left: 10px;
            border-radius: 50%;
            z-index: 3;
            border: 7px solid #fbb9b6;
            box-shadow: rgba(96, 75, 74, 0.1882352941) 0px 5px 5px 0px;
            transition: all 0.5s ease-in-out, z-index 0.5s ease-in-out 0.1s;
        }

        .card:hover .profile-pic img {
            transform: scale(1.3); 
            /* ADJUSTED: Pushes image down further while in the circle to keep face center */
            object-position: center 60%; 
            transition: all 0.5s ease-in-out 0.5s;
        }
    </style>
</head>
<body>

    <div class="card">
        <a href="mailto:analiza.mopera@example.com" class="mail">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
            </svg>
        </a>

        <div class="profile-pic">
            <img src="https://i.imgur.com/UdP7XbX.png" alt="Anna Mopera">
        </div>

        <div class="bottom">
            <div class="content">
                <span class="name">Anna Mopera</span>
                <span class="about-me">
                    <strong>Brand Specialist</strong><br>
                    Strategic consultant focused on visual identity and market positioning. I help businesses build authentic connections with their audience through cohesive design and purposeful storytelling.
                </span>
            </div>

            <div class="bottom-bottom">
                <div class="social-links-container">
                    <a href="https://www.facebook.com/analiza.mopera" target="_blank">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                        </svg>
                    </a>
                </div>
                
                <a href="tel:+639778341105" class="button">Contact me: +639778341105</a>
            </div>
        </div>
    </div>

</body>
</html>
