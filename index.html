<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfredo Valle | Projectvibe</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        /* From Uiverse.io by Smit-Prajapati */ 
        .card {
            width: 280px;
            height: 280px;
            background: white;
            border-radius: 32px;
            padding: 3px;
            position: relative;
            box-shadow: #604b4a30 0px 70px 30px -50px;
            transition: all 0.5s ease-in-out;
            cursor: pointer;
        }

        .card .mail {
            position: absolute;
            right: 2rem;
            top: 1.4rem;
            background: transparent;
            border: none;
            z-index: 10;
        }

        .card .mail svg {
            stroke: #fbb9b6;
            stroke-width: 3px;
            width: 24px;
            height: 24px;
            transition: stroke 0.3s;
        }

        .card .mail svg:hover {
            stroke: #f55d56;
        }

        .card .profile-pic {
            position: absolute;
            width: calc(100% - 6px);
            height: calc(100% - 6px);
            top: 3px;
            left: 3px;
            border-radius: 29px;
            z-index: 1;
            overflow: hidden;
            transition: all 0.5s ease-in-out 0.2s, z-index 0.5s ease-in-out 0.2s;
        }

        .card .profile-pic img {
            object-fit: cover;
            width: 100%;
            height: 100%;
            /* Centers the face in your specific photo */
            object-position: center 20%; 
            transition: all 0.5s ease-in-out 0s;
        }

        .card .bottom {
            position: absolute;
            bottom: 3px;
            left: 3px;
            right: 3px;
            background: #fbb9b6;
            top: 80%;
            border-radius: 29px;
            z-index: 2;
            box-shadow: rgba(96, 75, 74, 0.1882352941) 0px 5px 5px 0px inset;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.645, 0.045, 0.355, 1) 0s;
        }

        .card .bottom .content {
            position: absolute;
            bottom: 65px;
            left: 1.5rem;
            right: 1.5rem;
        }

        .card .bottom .content .name {
            display: block;
            font-size: 1.2rem;
            color: white;
            font-weight: bold;
        }

        .card .bottom .content .about-me {
            display: block;
            font-size: 0.85rem;
            color: white;
            margin-top: 0.8rem;
            line-height: 1.3;
        }

        .card .bottom .bottom-bottom {
            position: absolute;
            bottom: 1rem;
            left: 1.5rem;
            right: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card .bottom .bottom-bottom .social-links-container {
            display: flex;
            gap: 1rem;
        }

        .card .bottom .bottom-bottom .social-links-container svg {
            height: 20px;
            width: 20px;
            fill: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .card .bottom .bottom-bottom .social-links-container svg:hover {
            fill: #f55d56;
            transform: scale(1.2);
        }

        .card .bottom .bottom-bottom .button {
            background: white;
            color: #fbb9b6;
            border: none;
            border-radius: 20px;
            font-size: 0.7rem;
            padding: 0.4rem 0.8rem;
            font-weight: bold;
            cursor: pointer;
        }

        .card .bottom .bottom-bottom .button:hover {
            background: #f55d56;
            color: white;
        }

        /* Hover States */
        .card:hover {
            border-top-left-radius: 55px;
        }

        .card:hover .bottom {
            top: 20%;
            border-radius: 80px 29px 29px 29px;
            transition: all 0.5s cubic-bezier(0.645, 0.045, 0.355, 1) 0.2s;
        }

        .card:hover .profile-pic {
            width: 100px;
            height: 100px;
            top: 10px;
            left: 10px;
            border-radius: 50%;
            z-index: 3;
            border: 7px solid #fbb9b6;
            box-shadow: rgba(96, 75, 74, 0.1882352941) 0px 5px 5px 0px;
            transition: all 0.5s ease-in-out, z-index 0.5s ease-in-out 0.1s;
        }

        .card:hover .profile-pic img {
            transform: scale(1.3); 
            object-position: center 15%;
            transition: all 0.5s ease-in-out 0.5s;
        }
    </style>
</head>
<body>

    <div class="card">
        <button class="mail">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
            </svg>
        </button>

        <div class="profile-pic">
            <img src="https://i.imgur.com/UdP7XbX.png" alt="Alfredo Valle">
        </div>

        <div class="bottom">
            <div class="content">
                <span class="name">Alfredo Valle</span>
                <span class="about-me">
                    Web Developer & Graphic Designer specializing in marketing-driven digital solutions and creative branding.
                </span>
            </div>

            <div class="bottom-bottom">
                <div class="social-links-container">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.372.79 1.102.79 2.222v3.293c0 .319.22.694.825.576C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
                    </svg>
                </div>
                <button class="button">Projectvibe</button>
            </div>
        </div>
    </div>

</body>
</html>
