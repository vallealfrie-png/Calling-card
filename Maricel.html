<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

        body {
            background-color: #fdf6f5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
            font-family: 'Inter', sans-serif;
        }

        /* --- Logo Styles (Top Outside Card) --- */
        .company-logo-container {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .company-logo-container img {
            width: 120px;
            height: auto;
        }

        /* --- Profile Card Styles --- */
        .card {
            width: 280px;
            height: 280px;
            background: white;
            border-radius: 32px;
            padding: 3px;
            position: relative;
            box-shadow: #8d7a7930 0px 70px 30px -50px;
            transition: all 0.5s ease-in-out;
            overflow: hidden;
            margin-bottom: 30px;
        }

        /* Mail Icon (Top Right) */
        .card .mail {
            position: absolute;
            right: 1.5rem;
            top: 1.4rem;
            z-index: 10;
            text-decoration: none;
        }

        .card .mail svg {
            stroke: #ff8a8a; 
            stroke-width: 3px;
            width: 24px;
            height: 24px;
        }

        .card .profile-pic {
            position: absolute;
            width: calc(100% - 6px);
            height: calc(100% - 6px);
            top: 3px;
            left: 3px;
            border-radius: 29px;
            z-index: 1;
            overflow: hidden;
            transition: all 0.5s ease-in-out 0.2s;
        }

        .card .profile-pic img {
            object-fit: cover;
            width: 100%;
            height: 100%;
            object-position: center 20%; 
            transition: all 0.5s ease-in-out 0s;
        }

        .card .bottom {
            position: absolute;
            bottom: 3px;
            left: 3px;
            right: 3px;
            background: linear-gradient(135deg, #ff8a8a, #fbc4ab); 
            top: 80%; 
            border-radius: 29px;
            z-index: 2;
            box-shadow: rgba(255, 138, 138, 0.2) 0px 5px 5px 0px inset;
            transition: all 0.5s cubic-bezier(0.645, 0.045, 0.355, 1) 0s;
            display: flex;
            flex-direction: column;
        }

        .card .bottom .content {
            padding: 1rem 1.2rem;
            opacity: 0;
            transition: opacity 0.3s ease-in-out, transform 0.5s ease-in-out;
            pointer-events: none;
        }

        .card .bottom .content .name {
            display: block;
            font-size: 1.1rem;
            color: white;
            font-weight: bold;
        }

        .card .bottom .content .position-label {
            display: block;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.2;
        }

        .card .bottom .content .about-me {
            display: block;
            font-size: 0.7rem;
            color: white;
            line-height: 1.4;
        }

        .card .bottom .bottom-bottom {
            position: absolute;
            bottom: 12px;
            left: 1.2rem;
            right: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 5;
        }

        /* Fixed Social Links Container */
        .bottom-bottom .social-links-container {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .bottom-bottom .social-links-container a {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .bottom-bottom .social-links-container svg {
            height: 22px;
            width: 22px;
            fill: white;
            transition: all 0.3s ease;
        }

        /* Update hover color to soft red for both FB and Viber */
        .bottom-bottom .social-links-container a:hover svg {
            fill: #ff8a8a;
            transform: scale(1.1);
        }

        .card .bottom .bottom-bottom .button {
            background: white;
            color: #ff8a8a; 
            text-decoration: none;
            border-radius: 20px;
            font-size: 0.7rem;
            padding: 0.5rem 1rem;
            font-weight: bold;
        }

        /* --- Hover States --- */
        .card:hover .bottom {
            top: 20%;
            border-radius: 60px 29px 29px 29px;
        }

        .card:hover .bottom .content {
            opacity: 1;
            transform: translateY(50px); 
            pointer-events: auto;
        }

        .card:hover .profile-pic {
            width: 100px;
            height: 100px;
            top: 12px;
            left: 12px;
            border-radius: 50%;
            z-index: 3;
            border: 6px solid white;
        }

        .card:hover .profile-pic img {
            transform: scale(1.1); 
        }

        /* --- Animation Section --- */
        .wrapper { text-align: center; }
        .title { font-size: 1.5rem; font-weight: 700; color: #5a4a4a; }
        .title span:after {
            content: 'Marketing Events';
            animation: words 9s infinite;
        }

        @keyframes words {
            0%, 33% { content: 'Events Activation Specialist'; color: #ff8a8a; }
            34%, 66% { content: 'Brand Experience Expert'; color: #fbc4ab; }
            67%, 100% { content: 'Marketing Professional'; color: #ff9a9e; }
        }
    </style>
