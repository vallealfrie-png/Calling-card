<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maricel A. Ang | Digital Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

        body {
            background-color: #fdf6f5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
            font-family: 'Inter', sans-serif;
        }

        .company-logo-container {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .company-logo-container img {
            width: 120px;
            height: auto;
        }

        .card {
            width: 280px;
            height: 280px;
            background: white;
            border-radius: 32px;
            padding: 3px;
            position: relative;
            box-shadow: #8d7a7930 0px 70px 30px -50px;
            transition: all 0.5s ease-in-out;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .card .mail {
            position: absolute;
            right: 1.5rem;
            top: 1.4rem;
            z-index: 10;
            color: #ff8a8a;
            font-size: 1.4rem;
            text-decoration: none;
        }

        .card .profile-pic {
            position: absolute;
            width: calc(100% - 6px);
            height: calc(100% - 6px);
            top: 3px;
            left: 3px;
            border-radius: 29px;
            z-index: 1;
            overflow: hidden;
            transition: all 0.5s ease-in-out 0.2s;
        }

        .card .profile-pic img {
            object-fit: cover;
            width: 100%;
            height: 100%;
            object-position: center 20%; 
            transition: all 0.5s ease-in-out 0s;
        }

        .card .bottom {
            position: absolute;
            bottom: 3px;
            left: 3px;
            right: 3px;
            background: linear-gradient(135deg, #ff8a8a, #fbc4ab); 
            top: 80%; 
            border-radius: 29px;
            z-index: 2;
            box-shadow: rgba(255, 138, 138, 0.2) 0px 5px 5px 0px inset;
            transition: all 0.5s cubic-bezier(0.645, 0.045, 0.355, 1) 0s;
            display: flex;
            flex-direction: column;
        }

        .card .bottom .content {
            padding: 1rem 1.2rem;
            opacity: 0;
            transition: opacity 0.3s ease-in-out, transform 0.5s ease-in-out;
            pointer-events: none;
        }

        .card .bottom .content .name {
            display: block;
            font-size: 1.1rem;
            color: white;
            font-weight: bold;
        }

        .card .bottom .content .position-label {
            display: block;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.2;
        }

        .card .bottom .content .about-me {
            display: block;
            font-size: 0.7rem;
            color: white;
            line-height: 1.4;
        }

        .card .bottom .bottom-bottom {
            position: absolute;
            bottom: 12px;
            left: 1.2rem;
            right: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 5;
        }

        .social-links-container {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .social-links-container a {
            color: white;
            font-size: 1.3rem;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-links-container a:hover {
            color: #ff8a8a;
            transform: scale(1.2);
        }

        .card .bottom .bottom-bottom .button {
            background: white;
            color: #ff8a8a; 
            text-decoration: none;
            border-radius: 20px;
            font-size: 0.7rem;
            padding: 0.5rem 1rem;
            font-weight: bold;
        }

        .card:hover .bottom {
            top: 20%;
            border-radius: 60px 29px 29px 29px;
        }

        .card:hover .bottom .content {
            opacity: 1;
            transform: translateY(50px); 
            pointer-events: auto;
        }

        .card:hover .profile-pic {
            width: 100px;
            height: 100px;
            top: 12px;
            left: 12px;
            border-radius: 50%;
            z-index: 3;
            border: 6px solid white;
        }

        .wrapper { text-align: center; }
        .title { font-size: 1.5rem; font-weight: 700; color: #5a4a4a; }
        .title span:after {
            content: 'Marketing Events';
            animation: words 9s infinite;
        }

        @keyframes words {
            0%, 33% { content: 'Events Activation Specialist'; color: #ff8a8a; }
            34%, 66% { content: 'Brand Experience Expert'; color: #fbc4ab; }
            67%, 100% { content: 'Marketing Professional'; color: #ff9a9e; }
        }
    </style>
</head>
<body>

    <div class="company-logo-container">
        <img src="https://i.imgur.com/VbZKWAf.png" alt="Company Logo">
    </div>

    <div class="card">
        <a href="mailto:angmcel.phmclp@gmail.com" class="mail">
            <i class="fa-solid fa-envelope"></i>
        </a>

        <div class="profile-pic">
            <img src="https://i.imgur.com/pYCr0hL.png" alt="Maricel A. Ang">
        </div>

        <div class="bottom">
            <div class="content">
                <span class="name">Maricel A. Ang</span>
                <span class="position-label">Marketing Events Activation Specialist</span>
                <span class="about-me">
                    Expert in creating high-impact brand activations. I specialize in turning marketing strategies into immersive live experiences that drive engagement.
                </span>
            </div>

            <div class="bottom-bottom">
                <div class="social-links-container">
                    <a href="https://www.facebook.com/share/1CHgvi97Pf/" target="_blank">
                        <i class="fa-brands fa-facebook"></i>
                    </a>
                    <a href="viber://chat?number=%2B639277898188">
                        <i class="fa-brands fa-viber"></i>
                    </a>
                </div>
                <a href="tel:+639277898188" class="button">Contact Me</a>
            </div>
        </div>
    </div>

    <div class="wrapper">
        <h1 class="title">
            I am a
            <span></span>
        </h1>
    </div>

</body>
</html>
