<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Services Focus Carousel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        body { background-color: #0f172a; overflow-x: hidden; }

        /* The height of this container controls the "scroll speed" */
        .scroll-container { height: 500vh; }

        .viewport {
            position: sticky;
            top: 0;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        /* The circular track tucked into the right side */
        .wheel-track {
            position: absolute;
            right: -300px; /* Adjust to hide more/less of the circle */
            width: 700px;
            height: 700px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s linear;
        }

        .service-card {
            transition: all 0.4s ease;
            filter: grayscale(100%) opacity(0.3);
            transform: scale(0.8);
        }

        /* Styling for the focused card */
        .service-card.active {
            filter: grayscale(0%) opacity(1);
            transform: scale(1.1);
            border-color: #6366f1;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }

        .bg-image-fade {
            transition: opacity 0.8s ease, transform 1.2s ease;
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            z-index: 0;
        }

        .bg-image-fade.active {
            opacity: 0.4;
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .wheel-track { right: -450px; width: 600px; height: 600px; }
        }
    </style>
</head>
<body class="no-scrollbar">

    <div id="bg-container" class="fixed inset-0 w-full h-full">
        <img src="https://i.imgur.com/b3WI1PI.jpeg" class="bg-image-fade" id="bg-0">
        <img src="https://i.imgur.com/ulEsYqJ.jpeg" class="bg-image-fade" id="bg-1">
        <img src="https://i.imgur.com/AnolGwk.png" class="bg-image-fade" id="bg-2">
        <img src="https://i.imgur.com/C53Uskn.jpeg" class="bg-image-fade" id="bg-3">
        <img src="https://i.imgur.com/48gJAM5.jpeg" class="bg-image-fade" id="bg-4">
        <div class="absolute inset-0 bg-gradient-to-r from-slate-900 via-slate-900/80 to-transparent"></div>
    </div>

    <div class="scroll-container">
        <div class="viewport">
            
            <div class="relative z-10 ml-10 md:ml-20 max-w-lg pointer-events-none">
                <h1 class="text-indigo-400 font-bold tracking-widest uppercase text-sm mb-2">Our Specializations</h1>
                <h2 id="focus-title" class="text-white text-4xl md:text-6xl font-black transition-all duration-500">CABG</h2>
                <p class="text-slate-400 mt-4 text-lg">Scroll to explore our medical packages.</p>
            </div>

            <div id="wheel" class="wheel-track">
                
                <div class="absolute w-40 h-40 bg-white rounded-full z-20 shadow-2xl flex items-center justify-center border-8 border-slate-900">
                    <div class="text-slate-900 font-black text-xs tracking-tighter text-center">
                        MEDICAL<br>HUB
                    </div>
                </div>

                <div class="item absolute" style="transform: rotate(0deg) translateX(-300px);"><div class="service-card bg-slate-800 p-4 rounded-xl border border-white/10 w-48 text-white font-bold text-center" data-index="0" data-title="Coronary Artery Bypass Graft">CABG</div></div>
                <div class="item absolute" style="transform: rotate(40deg) translateX(-300px);"><div class="service-card bg-slate-800 p-4 rounded-xl border border-white/10 w-48 text-white font-bold text-center" data-index="1" data-title="Maternity Packages">Maternity</div></div>
                <div class="item absolute" style="transform: rotate(80deg) translateX(-300px);"><div class="service-card bg-slate-800 p-4 rounded-xl border border-white/10 w-48 text-white font-bold text-center" data-index="2" data-title="Cardiac Health Packages">Cardiac Health</div></div>
                <div class="item absolute" style="transform: rotate(120deg) translateX(-300px);"><div class="service-card bg-slate-800 p-4 rounded-xl border border-white/10 w-48 text-white font-bold text-center" data-index="3" data-title="Laparoscopic Cholecystectomy">Laparoscopic</div></div>
                <div class="item absolute" style="transform: rotate(160deg) translateX(-300px);"><div class="service-card bg-slate-800 p-4 rounded-xl border border-white/10 w-48 text-white font-bold text-center" data-index="4" data-title="Liver Screening Packages">Liver Screening</div></div>

            </div>
        </div>
    </div>

    <script>
        const wheel = document.getElementById('wheel');
        const cards = document.querySelectorAll('.service-card');
        const bgs = document.querySelectorAll('.bg-image-fade');
        const focusTitle = document.getElementById('focus-title');
        
        const cardData = [
            "Coronary Artery Bypass Graft",
            "Maternity Packages",
            "Cardiac Health Packages",
            "Laparoscopic Cholecystectomy",
            "Liver Screening Packages"
        ];

        window.addEventListener('scroll', () => {
            const scrollPercent = window.scrollY / (document.body.offsetHeight - window.innerHeight);
            
            // 1. Rotate the wheel (from 0 to -160 degrees)
            const wheelRotation = scrollPercent * -160;
            wheel.style.transform = `rotate(${wheelRotation}deg)`;

            // 2. Identify which card is in the "Center" (around the 0-degree mark relative to the viewport)
            // Since cards are spaced 40 degrees apart:
            const activeIndex = Math.min(Math.max(Math.round(Math.abs(wheelRotation) / 40), 0), 4);

            cards.forEach((card, i) => {
                // Counter-rotate text so it stays upright
                const itemRotation = i * 40;
                card.style.transform = `rotate(${Math.abs(wheelRotation) - itemRotation}deg)`;

                // Handle Active State
                if (i === activeIndex) {
                    card.classList.add('active');
                    bgs[i].classList.add('active');
                    focusTitle.innerText = cardData[i];
                } else {
                    card.classList.remove('active');
                    bgs[i].classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
