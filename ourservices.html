<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Half-Circle Sidebar Carousel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Rotates the entire track */
        @keyframes rotate-half {
            0% { transform: translateY(-50%) rotate(-90deg); }
            100% { transform: translateY(-50%) rotate(90deg); }
        }
        /* Keeps cards upright */
        @keyframes counter-rotate {
            0% { transform: rotate(90deg); }
            100% { transform: rotate(-90deg); }
        }
        .animate-orbit {
            animation: rotate-half 10s ease-in-out infinite alternate;
        }
        .animate-counter {
            animation: counter-rotate 10s ease-in-out infinite alternate;
        }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center overflow-hidden">

    <div class="relative h-screen w-64 flex items-center">
        
        <div class="absolute left-[-50%] top-1/2 -translate-y-1/2 
                    w-[500px] aspect-square rounded-full border border-white/5 bg-[#f5f4fe]/5">
        </div>

        <div class="absolute left-[-40%] top-1/2 -translate-y-1/2 
                    w-[400px] aspect-square rounded-full border-2 border-dashed border-indigo-500/20">
        </div>

        <div class="absolute left-[-115px] top-1/2 -translate-y-1/2 
                    w-[230px] aspect-square rounded-full bg-white shadow-2xl z-20 flex items-center justify-end pr-8">
            <div class="text-right">
                <p class="text-slate-400 text-xs font-bold tracking-widest uppercase">Menu</p>
                <h2 class="text-slate-800 text-xl font-black">NAV</h2>
            </div>
        </div>

        <div class="absolute left-[-200px] top-1/2 w-[400px] aspect-square animate-orbit">
            
            <div class="absolute top-1/2 right-0 -translate-y-1/2 translate-x-1/2 animate-counter">
                <div class="w-32 h-20 bg-indigo-600 rounded-xl shadow-lg flex flex-col justify-center px-4 border border-indigo-400/50">
                    <span class="text-white font-bold">Project A</span>
                    <span class="text-indigo-200 text-[10px]">Development</span>
                </div>
            </div>

            <div class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 animate-counter">
                <div class="w-32 h-20 bg-slate-800 rounded-xl shadow-lg flex flex-col justify-center px-4 border border-slate-700">
                    <span class="text-white font-bold">Project B</span>
                    <span class="text-slate-400 text-[10px]">Analytics</span>
                </div>
            </div>

            <div class="absolute bottom-0 left-1/2 -translate-x-1/2 translate-y-1/2 animate-counter">
                <div class="w-32 h-20 bg-slate-800 rounded-xl shadow-lg flex flex-col justify-center px-4 border border-slate-700">
                    <span class="text-white font-bold">Project C</span>
                    <span class="text-slate-400 text-[10px]">Design</span>
                </div>
            </div>

        </div>

    </div>

    <main class="flex-1 p-20">
        <h1 class="text-white text-4xl font-light">Interactive <span class="font-bold text-indigo-500">Sidebar</span></h1>
        <p class="text-slate-400 mt-4 max-w-md">The navigation cards orbit the center hub. The left half of the circle is hidden off-screen to create the sidebar effect.</p>
    </main>

</body>
</html>
