<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smooth Scroll Reveal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        body { background-color: #020617; }

        /* Each section takes exactly 100% of the viewport */
        section {
            height: 100vh;
            width: 100%;
            position: sticky;
            top: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-color: #020617;
        }

        .image-container {
            width: 90%;
            max-width: 800px;
            aspect-ratio: 16/9;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            background: #0f172a;
        }

        .medical-img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Ensures the image is NEVER cut */
            transition: transform 0.1s linear;
        }

        .content-overlay {
            margin-top: 2rem;
            text-align: center;
            transition: opacity 0.5s ease;
        }

        /* Logic for the "Revealing" transition */
        .reveal-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            clip-path: inset(100% 0 0 0); /* Hidden by default (bottom up) */
            transition: clip-path 0.1s linear;
        }
    </style>
</head>
<body class="no-scrollbar">

    <section id="sec-1" style="z-index: 1;">
        <div class="image-container">
            <img src="https://i.imgur.com/b3WI1PI.jpeg" class="medical-img">
        </div>
        <div class="content-overlay">
            <h2 class="text-white text-3xl md:text-5xl font-bold uppercase tracking-tighter">CABG</h2>
            <p class="text-indigo-400 text-sm font-medium mt-2">Coronary Artery Bypass Graft</p>
        </div>
    </section>

    <section id="sec-2" style="z-index: 2;">
        <div class="image-container">
            <img src="https://i.imgur.com/ulEsYqJ.jpeg" class="medical-img">
        </div>
        <div class="content-overlay">
            <h2 class="text-white text-3xl md:text-5xl font-bold uppercase tracking-tighter">Maternity</h2>
            <p class="text-indigo-400 text-sm font-medium mt-2">Premium Maternity Packages</p>
        </div>
    </section>

    <section id="sec-3" style="z-index: 3;">
        <div class="image-container">
            <img src="https://i.imgur.com/AnolGwk.png" class="medical-img">
        </div>
        <div class="content-overlay">
            <h2 class="text-white text-3xl md:text-5xl font-bold uppercase tracking-tighter">Cardiac</h2>
            <p class="text-indigo-400 text-sm font-medium mt-2">Heart Health Screening</p>
        </div>
    </section>

    <section id="sec-4" style="z-index: 4;">
        <div class="image-container">
            <img src="https://i.imgur.com/C53Uskn.jpeg" class="medical-img">
        </div>
        <div class="content-overlay">
            <h2 class="text-white text-3xl md:text-5xl font-bold uppercase tracking-tighter">Laparoscopic</h2>
            <p class="text-indigo-400 text-sm font-medium mt-2">Cholecystectomy Procedures</p>
        </div>
    </section>

    <section id="sec-5" style="z-index: 5;">
        <div class="image-container">
            <img src="https://i.imgur.com/48gJAM5.jpeg" class="medical-img">
        </div>
        <div class="content-overlay">
            <h2 class="text-white text-3xl md:text-5xl font-bold uppercase tracking-tighter">Liver Care</h2>
            <p class="text-indigo-400 text-sm font-medium mt-2">Liver Screening Packages</p>
        </div>
    </section>

    <script>
        const sections = document.querySelectorAll('section');

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const vh = window.innerHeight;

            sections.forEach((section, index) => {
                // Determine how much of the section is scrolled
                // sectionTop is where the section starts relative to the document
                const sectionTop = vh * index;
                const distance = scrollY - sectionTop;
                
                // We calculate a percentage (0 to 1) of how much the section has "taken over"
                let progress = Math.min(Math.max(distance / vh, 0), 1);

                if (index > 0) {
                    // For every section after the first, we adjust its "Reveal"
                    // As progress goes from 0 to 1, the clip-path goes from 100% to 0%
                    const revealPercent = 100 - (progress * 100);
                    section.style.clipPath = `inset(${revealPercent}% 0 0 0)`;
                }
            });
        });
    </script>
</body>
</html>
