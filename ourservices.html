<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertical Circular Carousel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom animation for the vertical circular rotation */
        @keyframes rotate-carousel {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        .animate-vertical-rev {
            animation: rotate-carousel 20s linear infinite;
        }
        /* Keeps the content upright while the parent rotates */
        @keyframes counter-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(-360deg); }
        }
        .counter-rotate {
            animation: counter-rotate 20s linear infinite;
        }
    </style>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen overflow-hidden">

    <div class="relative w-full max-w-[600px] aspect-square flex items-center justify-center">
        
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 
                    w-[80%] aspect-square rounded-full border border-white/10 bg-[#f5f4fe] opacity-10">
        </div>

        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 
                    w-[55%] aspect-square rounded-full border-2 border-dashed border-indigo-400/30 bg-[#f5f4fe] opacity-20">
        </div>

        <div class="absolute top-1/2 left-1/2 w-[55%] aspect-square animate-vertical-rev">
            <div class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 w-12 h-12 bg-indigo-500 rounded-full flex items-center justify-center shadow-lg shadow-indigo-500/50 counter-rotate">
                <span class="text-white text-xs font-bold">01</span>
            </div>
            <div class="absolute bottom-0 left-1/2 -translate-x-1/2 translate-y-1/2 w-12 h-12 bg-purple-500 rounded-full flex items-center justify-center shadow-lg shadow-purple-500/50 counter-rotate">
                <span class="text-white text-xs font-bold">02</span>
            </div>
        </div>

        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 
                    w-[180px] sm:w-[230px] aspect-square rounded-full bg-white shadow-2xl flex flex-col items-center justify-center text-center p-6 z-10">
            <h2 class="text-slate-800 font-black text-xl uppercase tracking-tighter">Gemini</h2>
            <p class="text-slate-500 text-[10px] mt-2 font-medium">VERTICAL SYSTEM</p>
        </div>

    </div>

</body>
</html>
