<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Services Carousel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar hiding */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Smooth scroll behavior */
        html { scroll-behavior: smooth; }

        /* Card positioning logic along the arc */
        .card-container {
            perspective: 1000px;
            /* Adjust this height to control how long the scroll is */
            height: 300vh; 
        }

        .sticky-wrapper {
            position: sticky;
            top: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: flex-end; /* Anchored to the right for mobile/desktop */
        }

        /* The invisible track that items sit on */
        .rotating-track {
            position: absolute;
            right: -150px; /* Half-hidden off screen */
            width: 500px;
            height: 500px;
            border-radius: 50%;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @media (max-width: 640px) {
            .rotating-track {
                right: -250px; /* Hide more of the circle on small screens */
                width: 450px;
                height: 450px;
            }
        }
    </style>
</head>
<body class="bg-slate-900 text-white no-scrollbar">

    <div class="card-container">
        <div class="sticky-wrapper">
            
            <div class="absolute left-10 top-1/2 -translate-y-1/2 z-30 pointer-events-none">
                <h1 class="text-3xl md:text-5xl font-bold mb-2">Our Services</h1>
                <p class="text-slate-400">Scroll down slowly to explore</p>
                <div class="mt-8 w-12 h-20 border-2 border-white/20 rounded-full flex justify-center p-2">
                    <div class="w-1 h-3 bg-indigo-500 rounded-full animate-bounce"></div>
                </div>
            </div>

            <div class="absolute right-[-80px] w-[200px] h-[200px] bg-white rounded-full z-20 flex items-center shadow-2xl">
                <div class="pl-6">
                    <div class="w-2 h-2 bg-indigo-600 rounded-full animate-ping"></div>
                </div>
            </div>

            <div id="track" class="rotating-track flex items-center justify-center">
                
                <div class="absolute" style="transform: rotate(0deg) translateX(-250px);">
                    <div class="service-card" style="transform: rotate(0deg);">
                        <div class="w-48 h-32 md:w-64 md:h-40 bg-slate-800 rounded-2xl overflow-hidden border border-white/10 shadow-2xl">
                            <img src="https://i.imgur.com/b3WI1PI.jpeg" class="w-full h-2/3 object-cover opacity-80" alt="CABG">
                            <div class="p-3 text-xs font-bold bg-white text-slate-900 h-1/3 flex items-center">CABG</div>
                        </div>
                    </div>
                </div>

                <div class="absolute" style="transform: rotate(40deg) translateX(-250px);">
                    <div class="service-card" style="transform: rotate(-40deg);">
                        <div class="w-48 h-32 md:w-64 md:h-40 bg-slate-800 rounded-2xl overflow-hidden border border-white/10 shadow-2xl">
                            <img src="https://i.imgur.com/ulEsYqJ.jpeg" class="w-full h-2/3 object-cover opacity-80" alt="Maternity">
                            <div class="p-3 text-xs font-bold bg-white text-slate-900 h-1/3 flex items-center">Maternity Packages</div>
                        </div>
                    </div>
                </div>

                <div class="absolute" style="transform: rotate(80deg) translateX(-250px);">
                    <div class="service-card" style="transform: rotate(-80deg);">
                        <div class="w-48 h-32 md:w-64 md:h-40 bg-slate-800 rounded-2xl overflow-hidden border border-white/10 shadow-2xl">
                            <img src="https://i.imgur.com/AnolGwk.png" class="w-full h-2/3 object-cover opacity-80" alt="Cardiac">
                            <div class="p-3 text-xs font-bold bg-white text-slate-900 h-1/3 flex items-center">Cardiac Health Packages</div>
                        </div>
                    </div>
                </div>

                <div class="absolute" style="transform: rotate(120deg) translateX(-250px);">
                    <div class="service-card" style="transform: rotate(-120deg);">
                        <div class="w-48 h-32 md:w-64 md:h-40 bg-slate-800 rounded-2xl overflow-hidden border border-white/10 shadow-2xl">
                            <img src="https://i.imgur.com/C53Uskn.jpeg" class="w-full h-2/3 object-cover opacity-80" alt="Laparoscopic">
                            <div class="p-3 text-xs font-bold bg-white text-slate-900 h-1/3 flex items-center">Laparoscopic Cholecystectomy</div>
                        </div>
                    </div>
                </div>

                <div class="absolute" style="transform: rotate(160deg) translateX(-250px);">
                    <div class="service-card" style="transform: rotate(-160deg);">
                        <div class="w-48 h-32 md:w-64 md:h-40 bg-slate-800 rounded-2xl overflow-hidden border border-white/10 shadow-2xl">
                            <img src="https://i.imgur.com/48gJAM5.jpeg" class="w-full h-2/3 object-cover opacity-80" alt="Liver">
                            <div class="p-3 text-xs font-bold bg-white text-slate-900 h-1/3 flex items-center">Liver Screening Packages</div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const track = document.getElementById('track');
        const cards = document.querySelectorAll('.service-card');
        
        window.addEventListener('scroll', () => {
            // Calculate scroll percentage
            const scrollPercent = window.scrollY / (document.body.offsetHeight - window.innerHeight);
            
            // Rotate the track based on scroll (adjust 180 to control how far it spins)
            const rotation = scrollPercent * -180;
            track.style.transform = `rotate(${rotation}deg)`;

            // Counter-rotate each card so they stay upright
            cards.forEach((card, index) => {
                // The base rotation of each card item is index * 40
                const baseRotation = index * 40;
                card.style.transform = `rotate(${Math.abs(rotation) - baseRotation}deg)`;
            });
        });
    </script>
</body>
</html>
