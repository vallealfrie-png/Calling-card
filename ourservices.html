<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom-Scroll Medical Slider</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        body { background-color: #020617; color: white; overflow-x: hidden; }

        /* Controls the "length" of the scroll experience */
        .scroll-height { height: 700vh; }

        .viewport {
            position: sticky;
            top: 0;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1200px;
            overflow: hidden;
        }

        .slide-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .slide-wrapper {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease-out;
            will-change: transform, opacity;
        }

        .slide-image {
            width: 85vw;
            max-width: 600px;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .slide-title {
            margin-top: 2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            text-align: center;
        }
    </style>
</head>
<body class="no-scrollbar">

    <div class="scroll-height">
        <div class="viewport">
            
            <div class="absolute top-10 left-10 z-50">
                <p class="text-indigo-500 font-black tracking-widest text-xs uppercase">Medical Packages</p>
            </div>

            <div class="slide-wrapper" id="slide-0">
                <img src="https://i.imgur.com/b3WI1PI.jpeg" class="slide-image">
                <h2 class="slide-title text-3xl md:text-5xl">CABG</h2>
            </div>

            <div class="slide-wrapper" id="slide-1">
                <img src="https://i.imgur.com/ulEsYqJ.jpeg" class="slide-image">
                <h2 class="slide-title text-3xl md:text-5xl">Maternity</h2>
            </div>

            <div class="slide-wrapper" id="slide-2">
                <img src="https://i.imgur.com/AnolGwk.png" class="slide-image">
                <h2 class="slide-title text-3xl md:text-5xl">Cardiac Health</h2>
            </div>

            <div class="slide-wrapper" id="slide-3">
                <img src="https://i.imgur.com/C53Uskn.jpeg" class="slide-image">
                <h2 class="slide-title text-3xl md:text-5xl">Laparoscopic</h2>
            </div>

            <div class="slide-wrapper" id="slide-4">
                <img src="https://i.imgur.com/48gJAM5.jpeg" class="slide-image">
                <h2 class="slide-title text-3xl md:text-5xl">Liver Screening</h2>
            </div>

        </div>
    </div>

    <script>
        const slides = document.querySelectorAll('.slide-wrapper');
        const numSlides = slides.length;

        window.addEventListener('scroll', () => {
            const scrollPos = window.scrollY;
            const windowHeight = window.innerHeight;
            const totalHeight = document.body.offsetHeight - windowHeight;
            const scrollPercent = scrollPos / totalHeight;

            slides.forEach((slide, i) => {
                // Determine the "center" point for this specific slide
                // Each slide owns a portion of the total scroll
                const slideStart = i / numSlides;
                const slideEnd = (i + 1) / numSlides;
                const slideMid = (slideStart + slideEnd) / 2;

                // Distance from the current scroll to this slide's "focus" point
                // progress = 0 when perfectly in focus, negative when upcoming, positive when past
                const progress = (scrollPercent - slideMid) * numSlides;

                // ZOOM LOGIC:
                // Upcoming: scale starts small (e.g. 0.2)
                // Focus: scale is 1.0
                // Past: scale zooms way out (e.g. 3.0)
                const scale = 1 + (progress * 2); 
                
                // OPACITY LOGIC:
                // Smoothly appear around the 40% mark of its journey
                let opacity = 0;
                if (progress > -0.5 && progress < 0.5) {
                    // This creates a bell curve for opacity
                    opacity = 1 - Math.abs(progress) * 2;
                }

                // Apply styles
                // We use translateZ for a true 3D feel or just Scale
                slide.style.transform = `scale(${Math.max(0, scale)}) translateY(${progress * -50}px)`;
                slide.style.opacity = Math.max(0, opacity);
                
                // Ensure the focused slide is always on top
                slide.style.zIndex = opacity > 0.1 ? 10 : 0;
            });
        });

        // Initialize first slide
        window.dispatchEvent(new Event('scroll'));
    </script>
</body>
</html>
