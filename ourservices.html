<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Medical Carousel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        body { background-color: #0f172a; color: white; }

        /* Slows down the scroll feel */
        .scroll-container { height: 600vh; }

        .viewport {
            position: sticky;
            top: 0;
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            padding: 2rem;
        }

        /* Fixed Background Image - ensuring it stays whole */
        .image-stage {
            position: absolute;
            inset: 0;
            z-index: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, rgba(15,23,42,0.7) 0%, rgba(15,23,42,1) 100%);
        }

        .bg-img {
            max-width: 80%;
            max-height: 50%;
            object-fit: contain; /* Keeps the whole image visible */
            opacity: 0;
            transition: all 0.8s ease-in-out;
            transform: translateY(20px);
            position: absolute;
        }

        .bg-img.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* The Wheel Track - positioned bottom-right on mobile */
        .wheel-track {
            position: absolute;
            bottom: -250px;
            right: -250px;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            transition: transform 0.1s linear;
        }

        @media (min-width: 768px) {
            .wheel-track {
                bottom: auto;
                top: 50%;
                right: -300px;
                transform: translateY(-50%);
                width: 750px;
                height: 750px;
            }
        }

        .service-card {
            transition: all 0.3s ease;
            opacity: 0.2;
            transform: scale(0.8);
            white-space: nowrap;
        }

        .service-card.active {
            opacity: 1;
            transform: scale(1.1);
            color: #818cf8;
        }
    </style>
</head>
<body class="no-scrollbar">

    <div class="image-stage">
        <img src="https://i.imgur.com/b3WI1PI.jpeg" class="bg-img" id="bg-0">
        <img src="https://i.imgur.com/ulEsYqJ.jpeg" class="bg-img" id="bg-1">
        <img src="https://i.imgur.com/AnolGwk.png" class="bg-img" id="bg-2">
        <img src="https://i.imgur.com/C53Uskn.jpeg" class="bg-img" id="bg-3">
        <img src="https://i.imgur.com/48gJAM5.jpeg" class="bg-img" id="bg-4">
    </div>

    <div class="scroll-container">
        <div class="viewport">
            
            <div class="relative z-10 pt-10 md:pt-20 pointer-events-none">
                <p class="text-indigo-400 font-bold tracking-[0.2em] text-xs uppercase mb-2">Package Selection</p>
                <h2 id="focus-title" class="text-3xl md:text-5xl font-light tracking-tight max-w-xs md:max-w-md">CABG</h2>
            </div>

            <div class="relative z-10 pb-10 flex items-center gap-4 text-slate-500 text-xs font-medium uppercase tracking-widest">
                <div class="w-px h-12 bg-slate-700 relative overflow-hidden">
                    <div id="scroll-bar" class="absolute top-0 left-0 w-full bg-indigo-500 h-0 transition-all"></div>
                </div>
                <span>Slide Down</span>
            </div>

            <div id="wheel" class="wheel-track">
                
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-32 h-32 bg-slate-900 border border-white/10 rounded-full z-20 flex items-center justify-center">
                    <div class="w-1 h-1 bg-indigo-500 rounded-full"></div>
                </div>

                <div class="item absolute" style="transform: rotate(0deg) translateX(-280px);"><div class="service-card font-medium text-sm md:text-base" data-index="0">CABG</div></div>
                <div class="item absolute" style="transform: rotate(35deg) translateX(-280px);"><div class="service-card font-medium text-sm md:text-base" data-index="1">Maternity</div></div>
                <div class="item absolute" style="transform: rotate(70deg) translateX(-280px);"><div class="service-card font-medium text-sm md:text-base" data-index="2">Cardiac Health</div></div>
                <div class="item absolute" style="transform: rotate(105deg) translateX(-280px);"><div class="service-card font-medium text-sm md:text-base" data-index="3">Laparoscopic</div></div>
                <div class="item absolute" style="transform: rotate(140deg) translateX(-280px);"><div class="service-card font-medium text-sm md:text-base" data-index="4">Liver Screening</div></div>

            </div>
        </div>
    </div>

    <script>
        const wheel = document.getElementById('wheel');
        const cards = document.querySelectorAll('.service-card');
        const bgs = document.querySelectorAll('.bg-img');
        const focusTitle = document.getElementById('focus-title');
        const scrollBar = document.getElementById('scroll-bar');
        
        const fullNames = [
            "Coronary Artery Bypass Graft",
            "Maternity Packages",
            "Cardiac Health Packages",
            "Laparoscopic Cholecystectomy",
            "Liver Screening Packages"
        ];

        window.addEventListener('scroll', () => {
            const scrollPercent = window.scrollY / (document.body.offsetHeight - window.innerHeight);
            
            // UI Progress bar update
            scrollBar.style.height = (scrollPercent * 100) + '%';

            // Rotation Logic
            const rotation = scrollPercent * -140;
            wheel.style.transform = window.innerWidth < 768 
                ? `rotate(${rotation}deg)` 
                : `translateY(-50%) rotate(${rotation}deg)`;

            const activeIndex = Math.min(Math.max(Math.round(Math.abs(rotation) / 35), 0), 4);

            cards.forEach((card, i) => {
                const itemBaseRotation = i * 35;
                card.style.transform = `rotate(${Math.abs(rotation) - itemBaseRotation}deg)`;

                if (i === activeIndex) {
                    card.classList.add('active');
                    bgs[i].classList.add('active');
                    focusTitle.innerText = fullNames[activeIndex];
                } else {
                    card.classList.remove('active');
                    bgs[i].classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
